apiVersion: v1 
kind: ConfigMap
metadata: 
  name: catalogue
  namespace: roboshop
  labels:
    project: roboshop
    tier: backend
    component: catalogue

data: 
  MONGO: "true"
  MONGO_URL: "mongodb://mongodb:27017/catalogue"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalogue
  namespace: roboshop
  labels:
    project: roboshop
    tier: backend
    component: catalogue

spec:
  replicas: 1

  selector:
    matchLabels:
      project: roboshop
      tier: backend
      component: catalogue

  template:
    metadata:
      labels:
        project: roboshop
        tier: backend
        component: catalogue

    spec:
      containers:
        - name: catalogue
          image: dock944/catalogue:1.0.0
          resources:
            requests:
              cpu : "100m"
              memory: "128mi"
            limits:
              cpu : "100m"
              memory: "128mi"
                
          readinessProbe:
            tcpSocket:
              port: 8080
            failureThreshold: 2
            periodSeconds: 10
            initialDelaySeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            failureThreshold: 1
            periodSeconds: 10
  

          envFrom:
          - configMapRef:
              name: catalogue
 

---
apiVersion: v1
kind: Service

metadata:
  name: catalogue
  namespace: roboshop
  labels:
        project: roboshop
        tier: backend
        component: catalogue


spec:
  selector:
    project: roboshop
    tier: backend
    component: catalogue

  ports:
  - protocol: TCP
    port: 8080
    targetPort: 8080