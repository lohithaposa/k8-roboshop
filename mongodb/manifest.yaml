apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongodb
  namespace: roboshop
  labels:
    project: roboshop
    tier: database
    component: mongodb

spec:
  replicas: 1

  selector:
    matchLabels:
      project: roboshop
      tier: database
      component: mongodb

  template:
    metadata:
      labels:
        project: roboshop
        tier: database
        component: mongodb

    spec:
      containers:
        - name: mongodb
          image: dock944/mongodb:1.0.0
          ports:
            - containerPort: 27017

---
apiVersion: v1
kind: Service

metadata:
  name: mongodb
  namespace: roboshop

spec:
  selector:
    project: roboshop
    tier: database
    component: mongodb

  ports:
    - name: mongodb
      protocol: TCP
      port: 27017
      targetPort: 27017