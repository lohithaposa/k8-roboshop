apiVersion: v1 
kind: ConfigMap
metadata: 
  name: shipping
  namespace: roboshop
  labels:
    project: roboshop
    tier: backend
    component: shipping

data: 
  CART_ENDPOINT: "cart:8080"
  DB_HOST: "mysql"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: shipping
  namespace: roboshop
  labels:
    project: roboshop
    tier: backend
    component: shipping

spec:
  replicas: 1

  selector:
    matchLabels:
      project: roboshop
      tier: backend
      component: shipping

  template:
    metadata:
      labels:
        project: roboshop
        tier: backend
        component: shipping

    spec:
      containers:
        - name: shipping
          image: dock944/shipping:1.4.0
          imagePullPolicy: Always  #To pull the image everytime, even there may be the image with same version, rebuilding the same image multiple tyms
          resources:
            requests:
              cpu : "100m"
              memory: "128Mi"
            limits:
              cpu : "100m"
              memory: "128Mi"
                
          readinessProbe:
            tcpSocket:
              port: 8080
            failureThreshold: 2
            periodSeconds: 10
            initialDelaySeconds: 15

          startupProbe:
            httpGet:
              path: /health
              port: 8080
            periodSeconds: 10
            failureThreshold: 20 
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            failureThreshold: 1
            periodSeconds: 10
  

          envFrom:
          - configMapRef:
              name: shipping
 

---
apiVersion: v1
kind: Service

metadata:
  name: shipping
  namespace: roboshop
  labels:
        project: roboshop
        tier: backend
        component: shipping


spec:
  selector:
    project: roboshop
    tier: backend
    component: shipping

  ports:
  - protocol: TCP
    port: 8080
    targetPort: 8080