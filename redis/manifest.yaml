apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: roboshop
  labels:
    project: roboshop
    tier: database
    component: redis

spec:
  replicas: 1

  selector:
    matchLabels:
      project: roboshop
      tier: database
      component: redis

  template:
    metadata:
      labels:
        project: roboshop
        tier: database
        component: redis

    spec:
      containers:
        - name: redis
          image: redis:7.0
         
---
apiVersion: v1
kind: Service

metadata:
  name: redis
  namespace: roboshop

spec:
  selector:
    project: roboshop
    tier: database
    component: redis

  ports:
    - name: redis
      protocol: TCP
      port: 5679
      targetPort: 5679